
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0f0f;--s1:#1a1a1a;--s2:#242424;--s3:#2e2e2e;
  --tx:#f0f0f0;--tx2:#a0a0a0;--tx3:#606060;
  --ac:#a8d5a2;--ac2:#4caf7d;--ac3:#2d7a52;
  --br:#2e2e2e;--fnt:'Roboto','Segoe UI',sans-serif;
  --rad:16px;
}
body{background:transparent;font-family:var(--fnt);direction:rtl;}

.phone-outer{
  display:flex;justify-content:center;
  background:var(--color-background-secondary);
  border-radius:var(--border-radius-lg);
  padding:24px 16px 32px;
}
.phone{
  width:360px;
  background:var(--bg);
  border-radius:40px;
  overflow:hidden;
  border:8px solid #1e1e1e;
  outline:1px solid #333;
}
.status-bar{
  background:var(--bg);
  padding:12px 20px 4px;
  display:flex;justify-content:space-between;align-items:center;
}
.status-time{font-size:14px;font-weight:500;color:var(--tx);}
.status-icons{display:flex;gap:5px;align-items:center;}
.si{width:15px;height:10px;fill:var(--tx);}

.screen{background:var(--bg);min-height:720px;display:flex;flex-direction:column;}

.top-nav{
  padding:10px 20px 14px;
  display:flex;justify-content:space-between;align-items:center;
}
.nav-title{font-size:22px;font-weight:700;color:var(--tx);letter-spacing:-.3px;}
.nav-actions{display:flex;gap:8px;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--s2);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.icon-btn:hover{background:var(--s3);}
.icon-btn svg{width:18px;height:18px;fill:var(--tx2);}

.date-strip{
  padding:0 20px 16px;
  display:flex;gap:8px;overflow-x:auto;
}
.date-strip::-webkit-scrollbar{display:none;}
.day-chip{
  flex-shrink:0;width:46px;
  background:var(--s2);border-radius:14px;
  padding:8px 0;text-align:center;cursor:pointer;
  border:1.5px solid transparent;transition:all .15s;
}
.day-chip.active{background:var(--ac2);border-color:var(--ac2);}
.day-chip .dc-day{font-size:11px;color:var(--tx2);margin-bottom:4px;}
.day-chip.active .dc-day{color:rgba(255,255,255,.75);}
.day-chip .dc-num{font-size:16px;font-weight:600;color:var(--tx);}
.day-chip.active .dc-num{color:#fff;}
.day-chip.has-dot::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--ac2);margin:4px auto 0;}
.day-chip.active.has-dot::after{background:rgba(255,255,255,.6);}

.prog-card{
  margin:0 16px 16px;
  background:var(--s1);border-radius:var(--rad);
  padding:16px;border:0.5px solid var(--br);
}
.pc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.pc-label{font-size:13px;color:var(--tx2);}
.pc-pct{font-size:20px;font-weight:700;color:var(--ac);}
.pc-bar-bg{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.pc-bar-fill{height:100%;background:var(--ac2);border-radius:3px;transition:width .4s ease;}
.pc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.pc-stat{text-align:center;}
.pc-stat-n{font-size:18px;font-weight:700;color:var(--tx);}
.pc-stat-l{font-size:11px;color:var(--tx3);margin-top:2px;}

.section-label{
  padding:4px 20px 10px;
  font-size:12px;font-weight:500;
  color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;
}

.habits-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}

.habit-card{
  background:var(--s1);border-radius:var(--rad);
  padding:14px 16px;border:0.5px solid var(--br);
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.habit-card:active{background:var(--s2);}
.habit-card.done{border-color:var(--ac3);}
.habit-card.done{background:#0f1f17;}

.hc-check{
  width:26px;height:26px;border-radius:50%;
  border:2px solid var(--tx3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.habit-card.done .hc-check{background:var(--ac2);border-color:var(--ac2);}
.hc-check svg{display:none;width:13px;height:13px;}
.habit-card.done .hc-check svg{display:block;}

.hc-body{flex:1;min-width:0;}
.hc-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.hc-icon{font-size:16px;flex-shrink:0;}
.hc-name{font-size:14px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.habit-card.done .hc-name{color:var(--tx3);text-decoration:line-through;text-decoration-color:var(--tx3);}
.hc-meta{display:flex;align-items:center;gap:10px;}
.hc-streak{font-size:12px;color:#e0a44a;display:flex;align-items:center;gap:3px;}
.hc-streak svg{width:12px;height:12px;fill:#e0a44a;}
.hc-cat{font-size:11px;padding:2px 7px;border-radius:6px;font-weight:500;}
.hc-dots{display:flex;gap:3px;margin-right:auto;}
.hd{width:8px;height:8px;border-radius:2px;background:var(--s3);}
.hd.on{background:var(--ac2);}
.hd.cur{background:var(--s3);outline:1.5px solid var(--tx3);outline-offset:1px;}

.hc-del{
  width:30px;height:30px;border-radius:50%;
  background:transparent;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.hc-del svg{width:14px;height:14px;fill:var(--tx3);}

.fab{
  margin:20px 16px 0;
  background:var(--ac2);border:none;border-radius:16px;
  width:100%;padding:16px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;font-family:var(--fnt);
  font-size:15px;font-weight:600;color:#fff;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.fab:active{background:var(--ac3);}
.fab svg{width:18px;height:18px;fill:#fff;}

.add-sheet{
  margin:16px 16px 0;
  background:var(--s1);border-radius:var(--rad);
  padding:16px;border:0.5px solid var(--br);
  display:none;
}
.sheet-title{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:14px;}
.sheet-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.sheet-lbl{font-size:12px;color:var(--tx2);}
.sheet-input{
  background:var(--s2);border:0.5px solid var(--br);
  border-radius:10px;padding:10px 12px;
  font-size:14px;color:var(--tx);font-family:var(--fnt);
  outline:none;direction:rtl;width:100%;
}
.sheet-input:focus{border-color:var(--ac2);}
.sheet-select{
  background:var(--s2);border:0.5px solid var(--br);
  border-radius:10px;padding:10px 12px;
  font-size:14px;color:var(--tx);font-family:var(--fnt);
  outline:none;direction:rtl;width:100%;
}
.emoji-row{display:flex;gap:6px;flex-wrap:wrap;}
.ep{
  width:36px;height:36px;border-radius:10px;
  background:var(--s2);border:0.5px solid var(--br);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:background .1s;
}
.ep.sel{background:var(--ac3);border-color:var(--ac2);}
.sheet-actions{display:flex;gap:8px;margin-top:4px;}
.sh-btn{
  flex:1;padding:12px;border-radius:12px;
  font-size:14px;font-weight:500;font-family:var(--fnt);
  cursor:pointer;border:none;transition:background .15s;
}
.sh-save{background:var(--ac2);color:#fff;}
.sh-cancel{background:var(--s2);color:var(--tx2);}

.bottom-nav{
  margin-top:20px;
  background:var(--s1);
  border-top:0.5px solid var(--br);
  padding:10px 0 16px;
  display:flex;justify-content:space-around;
}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 16px;border-radius:12px;
  transition:background .15s;
}
.bn-item.active .bn-icon{background:rgba(76,175,125,.15);}
.bn-icon{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.bn-icon svg{width:20px;height:20px;fill:var(--tx3);}
.bn-item.active .bn-icon svg{fill:var(--ac2);}
.bn-lbl{font-size:10px;color:var(--tx3);}
.bn-item.active .bn-lbl{color:var(--ac2);}

.home-indicator{
  height:24px;display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.hi-bar{width:120px;height:4px;background:#333;border-radius:2px;}
</style>

<script>
const CATS = {
  'صحة':    {bg:'rgba(76,175,125,.15)',tx:'#4caf7d'},
  'إنتاجية':{bg:'rgba(100,149,237,.15)',tx:'#6495ed'},
  'تعلم':   {bg:'rgba(180,120,220,.15)',tx:'#b478dc'},
  'روحانية':{bg:'rgba(240,180,80,.15)',tx:'#f0b450'},
};
const EMOJIS=['💧','🏃','📚','🧘','🥗','💪','😴','✍️','🌿','🧠'];
let selEmoji='💧';
let sheetOpen=false;

let habits=[
  {id:1,name:'شرب الماء',emoji:'💧',cat:'صحة',streak:5,done:false,week:[1,1,1,0,1,1,0]},
  {id:2,name:'تمرين رياضي',emoji:'🏃',cat:'صحة',streak:12,done:false,week:[1,1,0,1,1,0,0]},
  {id:3,name:'قراءة 30 دقيقة',emoji:'📚',cat:'تعلم',streak:3,done:false,week:[0,1,1,1,0,1,0]},
  {id:4,name:'تأمل صباحي',emoji:'🧘',cat:'روحانية',streak:7,done:false,week:[1,1,1,1,1,1,0]},
];

function toggle(id){
  const h=habits.find(x=>x.id===id);
  if(!h) return;
  h.done=!h.done;
  h.week[6]=h.done?1:0;
  render();
}
function del(id){
  habits=habits.filter(h=>h.id!==id);
  render();
}
function toggleSheet(){
  sheetOpen=!sheetOpen;
  document.getElementById('add-sheet').style.display=sheetOpen?'block':'none';
}
function saveHabit(){
  const n=document.getElementById('sh-name').value.trim();
  if(!n) return;
  habits.push({id:Date.now(),name:n,emoji:selEmoji,cat:document.getElementById('sh-cat').value,streak:0,done:false,week:[0,0,0,0,0,0,0]});
  document.getElementById('sh-name').value='';
  sheetOpen=false;
  document.getElementById('add-sheet').style.display='none';
  render();
}
function buildEmojis(){
  const el=document.getElementById('sh-emojis');
  el.innerHTML=EMOJIS.map(e=>`<div class="ep${e===selEmoji?' sel':''}" onclick="selEmoji='${e}';buildEmojis()">${e}</div>`).join('');
}
function buildDates(){
  const strip=document.getElementById('date-strip');
  const today=new Date();
  const days=['أح','إث','ثل','أر','خم','جم','سب'];
  let html='';
  for(let i=-3;i<=3;i++){
    const d=new Date(today);
    d.setDate(today.getDate()+i);
    const isToday=i===0;
    const hasDot=i<0;
    html+=`<div class="day-chip${isToday?' active':''}${hasDot?' has-dot':''}">
      <div class="dc-day">${days[d.getDay()]}</div>
      <div class="dc-num">${d.getDate()}</div>
    </div>`;
  }
  strip.innerHTML=html;
}
function render(){
  const now=new Date();
  document.getElementById('s-time').textContent=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  const done=habits.filter(h=>h.done).length;
  const total=habits.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pc-pct').textContent=pct+'%';
  document.getElementById('pc-bar').style.width=pct+'%';
  document.getElementById('ps-done').textContent=done+'/'+total;
  document.getElementById('ps-streak').textContent=habits.reduce((m,h)=>Math.max(m,h.streak),0);
  const wt=habits.reduce((s,h)=>s+h.week.reduce((a,b)=>a+b,0),0);
  const wm=habits.length*7;
  document.getElementById('ps-week').textContent=(wm?Math.round(wt/wm*100):0)+'%';

  const list=document.getElementById('habits-list');
  list.innerHTML=habits.map(h=>{
    const cc=CATS[h.cat]||{bg:'rgba(160,160,160,.12)',tx:'#a0a0a0'};
    return`<div class="habit-card${h.done?' done':''}" onclick="toggle(${h.id})">
      <div class="hc-check">
        <svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5.5,10.5 12,3"/></svg>
      </div>
      <div class="hc-body">
        <div class="hc-top">
          <span class="hc-icon">${h.emoji}</span>
          <span class="hc-name">${h.name}</span>
        </div>
        <div class="hc-meta">
          <span class="hc-streak"><svg viewBox="0 0 24 24"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/></svg>${h.streak}</span>
          <span class="hc-cat" style="background:${cc.bg};color:${cc.tx}">${h.cat}</span>
          <div class="hc-dots">
            ${h.week.slice(0,6).map(d=>`<div class="hd${d?' on':''}"></div>`).join('')}
            <div class="hd${h.done?' on':' cur'}"></div>
          </div>
        </div>
      </div>
      <button class="hc-del" onclick="event.stopPropagation();del(${h.id})">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>`;
  }).join('');
}

buildDates();
buildEmojis();
render();
document.getElementById('sh-name').addEventListener('keydown',e=>{if(e.key==='Enter')saveHabit();});
</script>
